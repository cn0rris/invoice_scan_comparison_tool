<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invoice Scan Comparison Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="header-top">
          <div class="logo">
            <img class="logo-key" src="/static/images/kestrel.png" alt="Kestrel logo" />
            Invoice Scan Comparison Tool
          </div>
          <nav>
            <a href="/" class="nav-link{% if active_page == 'home' %} active{% endif %}">Home</a>
            <a href="/invoices" class="nav-link{% if active_page == 'invoices' %} active{% endif %}">Invoices</a>
            <a href="/runs" class="nav-link{% if active_page == 'runs' %} active{% endif %}">Runs</a>
          </nav>
        </div>
        <p class="subtitle">Evaluate how different LLMs extract data from legal invoices</p>
        <p class="in-progress-note">This project is still in-progress.</p>
      </div>
    </header>
    <main>
      <div class="main-inner{% if wide_page %} main-inner-wide{% endif %}">
        {% block content %}{% endblock %}
      </div>
    </main>
    <footer>
      <div class="footer-inner">
        <p>Invoice Scan Comparison Tool — part of the Kestrel project</p>
      </div>
    </footer>
  </div>
</body>
</html>
